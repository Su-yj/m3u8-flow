name: Build & Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "可选：手动指定版本号（例如 1.2.3）。留空则仅推送 latest"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_GHCR: ghcr.io/su-yj/m3u8-flow
  IMAGE_DOCKERHUB: su825800608/m3u8-flow

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          VERSION=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # refs/tags/v1.2.3 -> 1.2.3
            REF_NAME="${GITHUB_REF_NAME}"
            VERSION="${REF_NAME#v}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          fi

          TAGS=()
          if [[ -n "${VERSION}" ]]; then
            TAGS+=("${IMAGE_GHCR}:${VERSION}")
            TAGS+=("${IMAGE_DOCKERHUB}:${VERSION}")
          fi
          TAGS+=("${IMAGE_GHCR}:latest")
          TAGS+=("${IMAGE_DOCKERHUB}:latest")

          {
            echo "version=${VERSION}"
            echo "tags<<EOF"
            printf "%s\n" "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
